<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>🛒 Súper</title>
  <style>
    :root {
      --accent: #00ff88;
      --bg: #000;
      --surface: #111;
      --text-main: #fff;
      --text-muted: #aaa;
      --border: #333;
      --danger: #ff453a;
      --radius: 16px;
      --shadow: 0 4px 20px rgba(0,0,0,0.3);
      --note-bg: #1a1a1a;
      --note-border: #333;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    /* Permitir selección de texto en inputs y textareas */
    input, textarea, .search-input, .note-form input, .note-form textarea {
      -webkit-user-select: text;
      -moz-user-select: text;
      -ms-user-select: text;
      user-select: text;
      pointer-events: auto;
    }

    body {
      background: var(--bg);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      height: 100vh;
      position: fixed;
      width: 100%;
    }

    /* ... resto del CSS igual ... (mantener todo el CSS original) ... */
  </style>
</head>
<body>
  <!-- ... HTML igual ... (mantener todo el HTML original) ... -->
  <script>
    // ... código de carga inicial igual ...

    function setupSwipe() {
      const panelsContainer = document.getElementById('panels-container');
      
      // Touch events (mantener igual)
      panelsContainer.addEventListener('touchstart', (e) => {
        startX = e.touches[0].clientX;
        isSwiping = true;
      });
      
      panelsContainer.addEventListener('touchmove', (e) => {
        if (!isSwiping) return;
        currentX = e.touches[0].clientX;
        const diff = currentX - startX;
        
        const translateX = -currentPanel * 100 + (diff / window.innerWidth) * 100;
        panelsContainer.style.transform = `translateX(${translateX}vw)`;
      });
      
      panelsContainer.addEventListener('touchend', () => {
        if (!isSwiping) return;
        isSwiping = false;
        
        const diff = currentX - startX;
        const threshold = window.innerWidth / 4;
        
        if (diff > threshold && currentPanel > 0) {
          switchPanel(currentPanel - 1);
        } else if (diff < -threshold && currentPanel < 2) {
          switchPanel(currentPanel + 1);
        } else {
          switchPanel(currentPanel);
        }
      });
      
      // Mouse events - MODIFICADOS para no interferir con inputs
      panelsContainer.addEventListener('mousedown', (e) => {
        // No iniciar swipe si el click fue en un input o botón
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || 
            e.target.classList.contains('btn') || e.target.classList.contains('delete-btn') ||
            e.target.classList.contains('delete-note') || e.target.classList.contains('add-btn') ||
            e.target.classList.contains('product-card') || e.target.classList.contains('cart-item') ||
            e.target.classList.contains('note-card')) {
          return;
        }
        
        isMouseDown = true;
        startX = e.clientX;
        startTransform = -currentPanel * 100;
        panelsContainer.style.transition = 'none';
        e.preventDefault();
      });
      
      document.addEventListener('mousemove', (e) => {
        if (!isMouseDown) return;
        currentX = e.clientX;
        const diff = currentX - startX;
        
        const translateX = startTransform + (diff / window.innerWidth) * 100;
        panelsContainer.style.transform = `translateX(${translateX}vw)`;
        e.preventDefault();
      });
      
      document.addEventListener('mouseup', () => {
        if (!isMouseDown) return;
        isMouseDown = false;
        panelsContainer.style.transition = 'transform 0.6s cubic-bezier(0.25, 0.1, 0.25, 1)';
        
        const diff = currentX - startX;
        const threshold = window.innerWidth / 6;
        
        if (diff > threshold && currentPanel > 0) {
          switchPanel(currentPanel - 1);
        } else if (diff < -threshold && currentPanel < 2) {
          switchPanel(currentPanel + 1);
        } else {
          switchPanel(currentPanel);
        }
      });
      
      // Detener swipe si el mouse sale del área mientras está presionado
      panelsContainer.addEventListener('mouseleave', () => {
        if (isMouseDown) {
          isMouseDown = false;
          panelsContainer.style.transition = 'transform 0.6s cubic-bezier(0.25, 0.1, 0.25, 1)';
          switchPanel(currentPanel);
        }
      });
    }

    // ... resto del código igual ...

    // Asegurar que los inputs puedan recibir foco
    document.addEventListener('DOMContentLoaded', function() {
      // ... código de carga igual ...
      
      // Añadir eventos específicos para inputs
      const inputs = document.querySelectorAll('input, textarea');
      inputs.forEach(input => {
        input.addEventListener('focus', () => {
          // Detener cualquier swipe en progreso
          isMouseDown = false;
          isSwiping = false;
        });
        
        input.addEventListener('mousedown', (e) => {
          e.stopPropagation();
        });
      });
    });

    // ... resto del código igual ...
  </script>
</body>
</html>
