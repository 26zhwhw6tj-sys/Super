<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>🛒 Súper</title>
  <style>
    :root {
      --accent: #00ff88;
      --bg: #000;
      --surface: #111;
      --text-main: #fff;
      --text-muted: #aaa;
      --border: #333;
      --danger: #ff453a;
      --radius: 16px;
      --shadow: 0 4px 20px rgba(0,0,0,0.3);
      --note-bg: #1a1a1a;
      --note-border: #333;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--bg);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
      height: 100vh;
      position: fixed;
      width: 100%;
    }

    .launcher {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      transition: opacity 0.5s ease;
    }

    .launcher.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-bar {
      width: 200px;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .loading-progress {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 0%;
      background: white;
      border-radius: 2px;
      transition: width 0.1s linear;
    }

    .app-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .app-container.visible {
      opacity: 1;
    }

    .panels-container {
      display: flex;
      width: 300vw;
      height: 100vh;
      transition: transform 0.3s ease;
    }

    .panel {
      width: 100vw;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 20px;
      padding-top: 50px;
      padding-bottom: 80px;
      position: relative;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .panel-title {
      font-size: 24px;
      font-weight: bold;
    }

    .search-container {
      position: relative;
      margin-bottom: 20px;
    }

    .search-input {
      width: 100%;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-main);
      font-size: 16px;
    }

    .add-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-weight: bold;
      font-size: 12px;
      display: block; /* Cambiado de none a block */
    }

    .scroll-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .scroll-area {
      height: 100%;
      overflow-y: auto;
      padding: 0;
      margin: 0;
    }

    .scroll-area::-webkit-scrollbar { display: none; }

    .fade-overlay {
      position: absolute;
      left: 0;
      width: 100%;
      height: 30px;
      z-index: 10;
      pointer-events: none;
    }

    .top-fade {
      top: 0;
      background: linear-gradient(to bottom, #000, transparent);
    }

    .bottom-fade {
      bottom: 0;
      background: linear-gradient(to top, #000, transparent);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 12px;
      padding: 10px;
    }

    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .product-card:active {
      background: rgba(0, 255, 136, 0.2);
      color: var(--accent);
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 40px 0;
    }

    .cart-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 10px;
    }

    .cart-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      transition: border-color 0.2s;
    }

    .cart-item:active {
      border-color: var(--accent);
    }

    .item-info {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .item-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .item-qty {
      font-size: 13px;
      color: var(--text-muted);
      background: var(--bg);
      padding: 2px 8px;
      border-radius: 10px;
      flex-shrink: 0;
    }

    .delete-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      color: var(--danger);
      border-radius: 10px;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:active {
      background: rgba(255, 69, 58, 0.15);
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 60px 20px;
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state-text {
      font-size: 15px;
      line-height: 1.5;
    }

    .list-footer {
      padding-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: var(--text-muted);
      border-top: none;
    }

    .clear-all {
      color: var(--danger);
      background: none;
      border: none;
      font-size: 14px;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 8px;
      transition: background 0.2s;
    }

    .clear-all:active {
      background: rgba(255, 69, 58, 0.15);
    }

    .notes-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      padding: 10px;
    }

    .note-card {
      background: var(--note-bg);
      border: 1px solid var(--note-border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    .note-card:active {
      background: rgba(0, 255, 136, 0.1);
      border-color: var(--accent);
    }

    .note-title {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 8px;
      color: var(--accent);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .note-content {
      font-size: 14px;
      color: var(--text-main);
      flex: 1;
      white-space: pre-wrap; /* Mantiene los saltos de línea */
      word-wrap: break-word; /* Rompe palabras largas */
    }

    .note-date {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 12px;
      text-align: right;
    }

    .delete-note {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(255, 69, 58, 0.2);
      color: var(--danger);
      border: none;
      border-radius: 50%;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .note-card:hover .delete-note {
      opacity: 1;
    }

    .delete-note:active {
      background: rgba(255, 69, 58, 0.3);
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .modal.active {
      opacity: 1;
      pointer-events: all;
    }

    .modal-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 90%;
      max-width: 500px;
      padding: 20px;
      position: relative;
      transform: translateY(20px);
      transition: transform 0.3s;
    }

    .modal.active .modal-content {
      transform: translateY(0);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .modal-title {
      font-size: 18px;
      font-weight: bold;
    }

    .close-modal {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 24px;
      cursor: pointer;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }

    .close-modal:active {
      background: rgba(255, 255, 255, 0.1);
    }

    .note-form input,
    .note-form textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-main);
      font-family: inherit;
      font-size: 15px;
    }

    .note-form textarea {
      min-height: 150px;
      resize: vertical;
    }

    .note-form input:focus,
    .note-form textarea:focus {
      outline: none;
      border-color: var(--accent);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .btn {
      padding: 10px 20px;
      border-radius: var(--radius);
      border: none;
      font-weight: bold;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-cancel {
      background: var(--surface);
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-cancel:active {
      background: rgba(255, 255, 255, 0.1);
    }

    .btn-save {
      background: var(--accent);
      color: #000;
    }

    .btn-save:active {
      background: #00cc6a;
    }

    .btn-delete {
      background: var(--danger);
      color: #fff;
    }

    .btn-delete:active {
      background: #e03e34;
    }
  </style>
</head>
<body>
  <div class="launcher" id="launcher">
    <div class="loading-bar">
      <div class="loading-progress" id="loading-progress"></div>
    </div>
  </div>

  <div class="app-container" id="app-container">
    <div class="panels-container" id="panels-container">
      <div class="panel" id="explore-panel">
        <div class="panel-header">
          <h1 class="panel-title">Explorar</h1>
        </div>
        <div class="search-container">
          <input type="text" class="search-input" id="search" placeholder="Buscar...">
          <button class="add-btn" id="add-btn">AÑADIR</button>
        </div>
        <div class="scroll-container">
          <div class="fade-overlay top-fade"></div>
          <div class="scroll-area">
            <div class="grid" id="products-grid"></div>
          </div>
          <div class="fade-overlay bottom-fade"></div>
        </div>
      </div>

      <div class="panel" id="list-panel">
        <div class="panel-header">
          <h1 class="panel-title">Lista</h1>
        </div>
        <div class="scroll-container">
          <div class="fade-overlay top-fade"></div>
          <div class="scroll-area">
            <div class="cart-list" id="cart-list"></div>
          </div>
          <div class="fade-overlay bottom-fade"></div>
        </div>
        <div class="list-footer" id="list-footer" style="display: none;">
          <span id="total-text"></span>
          <button class="clear-all" id="clear-all">Vaciar</button>
        </div>
      </div>

      <div class="panel" id="notes-panel">
        <div class="panel-header">
          <h1 class="panel-title">Notas</h1>
        </div>
        <div class="search-container">
          <input type="text" class="search-input" id="search-notes" placeholder="Buscar notas...">
          <button class="add-btn" id="add-note-btn">NUEVA NOTA</button>
        </div>
        <div class="scroll-container">
          <div class="fade-overlay top-fade"></div>
          <div class="scroll-area">
            <div class="notes-grid" id="notes-grid"></div>
          </div>
          <div class="fade-overlay bottom-fade"></div>
        </div>
      </div>
    </div>

    <div class="modal" id="note-modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2 class="modal-title" id="modal-title">Nueva Nota</h2>
          <button class="close-modal" id="close-modal">×</button>
        </div>
        <form class="note-form" id="note-form">
          <input type="text" id="note-title" placeholder="Título de la nota" required>
          <textarea id="note-content" placeholder="Contenido de la nota" required></textarea>
          <div class="modal-actions">
            <button type="button" class="btn btn-cancel" id="cancel-note">Cancelar</button>
            <button type="submit" class="btn btn-save">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const launcher = document.getElementById('launcher');
      const loadingProgress = document.getElementById('loading-progress');
      const appContainer = document.getElementById('app-container');
      const panelsContainer = document.getElementById('panels-container');
      
      let progress = 0;
      let stallPoints = [];
      let speeds = [];
      
      for(let i = 0; i < 360; i++) {
        speeds.push(Math.random() * 10 + 1);
      }
      
      const stallCount = Math.floor(Math.random() * 5) + 3;
      for(let i = 0; i < stallCount; i++) {
        stallPoints.push(Math.random() * 90);
      }
      
      let speedIndex = 0;
      
      function updateProgress() {
        let isStalling = false;
        for(let i = 0; i < stallPoints.length; i++) {
          if (stallPoints[i] > 0 && Math.abs(progress - stallPoints[i]) < 1) {
            stallPoints[i] = -stallPoints[i];
            isStalling = true;
            const stallDuration = Math.random() * 800 + 200;
            
            setTimeout(() => {
              updateProgress();
            }, stallDuration);
            
            return;
          }
        }
        
        const currentSpeed = speeds[speedIndex] || (Math.random() * 3 + 0.5);
        speedIndex = (speedIndex + 1) % speeds.length;
        
        progress += currentSpeed * 0.3;
        
        if (progress >= 100) {
          progress = 100;
          loadingProgress.style.width = '100%';
          
          setTimeout(() => {
            launcher.classList.add('hidden');
            appContainer.classList.add('visible');
            panelsContainer.style.transform = 'translateX(-100vw)';
            initApp();
          }, 300);
          
          return;
        }
        
        loadingProgress.style.width = `${progress}%`;
        requestAnimationFrame(updateProgress);
      }
      
      requestAnimationFrame(updateProgress);
    });

    const PRODUCTS_STORAGE_KEY = 'superapp_products';
    const CART_STORAGE_KEY = 'superapp_cart';
    const NOTES_STORAGE_KEY = 'superapp_notes';

    function loadProductsFromStorage() {
      try {
        const stored = localStorage.getItem(PRODUCTS_STORAGE_KEY);
        if (stored) {
          return JSON.parse(stored);
        }
      } catch (e) {
        console.error("Error parsing products from localStorage:", e);
        return [];
      }
      return [];
    }

    function saveProductsToStorage(productsArray) {
      try {
        localStorage.setItem(PRODUCTS_STORAGE_KEY, JSON.stringify(productsArray));
        return true;
      } catch (e) {
        console.error("Error saving products to localStorage:", e);
        return false;
      }
    }

    function loadCartFromStorage() {
      try {
        const stored = localStorage.getItem(CART_STORAGE_KEY);
        if (stored) {
          return JSON.parse(stored);
        }
      } catch (e) {
        console.error("Error parsing cart from localStorage:", e);
        return [];
      }
      return [];
    }

    function saveCartToStorage(cartArray) {
      try {
        localStorage.setItem(CART_STORAGE_KEY, JSON.stringify(cartArray));
        return true;
      } catch (e) {
        console.error("Error saving cart to localStorage:", e);
        return false;
      }
    }

    function loadNotesFromStorage() {
      try {
        const stored = localStorage.getItem(NOTES_STORAGE_KEY);
        if (stored) {
          return JSON.parse(stored);
        }
      } catch (e) {
        console.error("Error parsing notes from localStorage:", e);
        return [];
      }
      return [];
    }

    function saveNotesToStorage(notesArray) {
      try {
        localStorage.setItem(NOTES_STORAGE_KEY, JSON.stringify(notesArray));
        return true;
      } catch (e) {
        console.error("Error saving notes to localStorage:", e);
        return false;
      }
    }

    let products = [];
    let cartItems = [];
    let notes = [];
    let currentPanel = 1;
    let startX = 0;
    let currentX = 0;
    let isSwiping = false;
    let currentNote = null;

    async function initApp() {
      loadAllDataFromStorage();
      renderProducts();
      renderCart();
      renderNotes();
      
      window.addEventListener('storage', handleStorageChange);
      window.addEventListener('SuperAppCartUpdated', handleCartUpdate);
      window.addEventListener('SuperAppProductsUpdated', handleProductsUpdate);
      window.addEventListener('SuperAppNotesUpdated', handleNotesUpdate);
      
      setupSwipe();
    }

    function loadAllDataFromStorage() {
      products = loadProductsFromStorage();
      if (products.length === 0) {
        products = defaultProducts.map(name => ({ name }));
        saveProductsToStorage(products);
      }

      cartItems = loadCartFromStorage();
      notes = loadNotesFromStorage();
    }

    function handleStorageChange(e) {
      if (e.key === PRODUCTS_STORAGE_KEY) {
        products = loadProductsFromStorage();
        renderProducts(document.getElementById('search').value);
      } else if (e.key === CART_STORAGE_KEY) {
        cartItems = loadCartFromStorage();
        renderCart();
      } else if (e.key === NOTES_STORAGE_KEY) {
        notes = loadNotesFromStorage();
        renderNotes(document.getElementById('search-notes').value);
      }
    }

    function handleCartUpdate() {
      cartItems = loadCartFromStorage();
      renderCart();
    }

    function handleProductsUpdate() {
      products = loadProductsFromStorage();
      renderProducts();
    }

    function handleNotesUpdate() {
      notes = loadNotesFromStorage();
      renderNotes();
    }

    function setupSwipe() {
      const panelsContainer = document.getElementById('panels-container');
      
      panelsContainer.addEventListener('touchstart', (e) => {
        startX = e.touches[0].clientX;
        isSwiping = true;
      });
      
      panelsContainer.addEventListener('touchmove', (e) => {
        if (!isSwiping) return;
        currentX = e.touches[0].clientX;
        const diff = currentX - startX;
        
        const translateX = -currentPanel * 100 + (diff / window.innerWidth) * 100;
        panelsContainer.style.transform = `translateX(${translateX}vw)`;
      });
      
      panelsContainer.addEventListener('touchend', () => {
        if (!isSwiping) return;
        isSwiping = false;
        
        const diff = currentX - startX;
        const threshold = window.innerWidth / 4;
        
        if (diff > threshold && currentPanel > 0) {
          switchPanel(currentPanel - 1);
        } else if (diff < -threshold && currentPanel < 2) {
          switchPanel(currentPanel + 1);
        } else {
          switchPanel(currentPanel);
        }
      });
      
      panelsContainer.addEventListener('mousedown', (e) => {
        startX = e.clientX;
        isSwiping = true;
      });
      
      panelsContainer.addEventListener('mousemove', (e) => {
        if (!isSwiping) return;
        currentX = e.clientX;
        const diff = currentX - startX;
        
        const translateX = -currentPanel * 100 + (diff / window.innerWidth) * 100;
        panelsContainer.style.transform = `translateX(${translateX}vw)`;
      });
      
      panelsContainer.addEventListener('mouseup', () => {
        if (!isSwiping) return;
        isSwiping = false;
        
        const diff = currentX - startX;
        const threshold = window.innerWidth / 4;
        
        if (diff > threshold && currentPanel > 0) {
          switchPanel(currentPanel - 1);
        } else if (diff < -threshold && currentPanel < 2) {
          switchPanel(currentPanel + 1);
        } else {
          switchPanel(currentPanel);
        }
      });
      
      panelsContainer.addEventListener('mouseleave', () => {
        if (isSwiping) {
          isSwiping = false;
          switchPanel(currentPanel);
        }
      });
    }

    function switchPanel(index) {
      if (index < 0 || index > 2) return;
      
      currentPanel = index;
      const panelsContainer = document.getElementById('panels-container');
      panelsContainer.style.transform = `translateX(-${index * 100}vw)`;
    }

    function renderProducts(query = "") {
      const filtered = query
        ? products.filter(p => p.name.toLowerCase().includes(query.toLowerCase()))
        : products;

      const grid = document.getElementById('products-grid');
      grid.innerHTML = '';

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty-state">No hay productos</div>';
        return;
      }

      filtered.forEach(item => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.textContent = item.name;
        card.onclick = () => addToCart(item.name);
        grid.appendChild(card);
      });
    }

    async function addToCart(name) {
      const existing = cartItems.find(item => item.name === name);
      if (existing) {
        existing.qty++;
      } else {
        cartItems.push({ name, qty: 1 });
      }
      saveCartToStorage(cartItems);
      window.dispatchEvent(new CustomEvent('SuperAppCartUpdated'));
    }

    document.getElementById('search').addEventListener('input', (e) => {
      renderProducts(e.target.value);
      const val = e.target.value;
      const exists = products.some(p => p.name.toLowerCase() === val.toLowerCase());
      document.getElementById('add-btn').style.display = val && !exists ? 'block' : 'none';
    });

    document.getElementById('add-btn').addEventListener('click', async () => {
      const input = document.getElementById('search');
      const name = input.value.trim();
      if (name) {
        const exists = products.some(p => p.name.toLowerCase() === name.toLowerCase());
        if (!exists) {
            products.push({ name });
            saveProductsToStorage(products);
            input.value = '';
            document.getElementById('add-btn').style.display = 'none';
            renderProducts();
        } else {
            alert("El producto ya existe.");
        }
      }
    });

    function renderCart() {
      const list = document.getElementById('cart-list');
      const footer = document.getElementById('list-footer');
      list.innerHTML = '';

      if (cartItems.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🛒</div>
            <p class="empty-state-text">Tu lista está vacía.<br>Añade productos desde <strong>Explorar</strong>.</p>
          </div>
        `;
        footer.style.display = 'none';
        return;
      }

      footer.style.display = 'flex';
      const sorted = [...cartItems].sort((a, b) => a.name.localeCompare(b.name));

      sorted.forEach((item, index) => {
        if (!item.id) {
          item.id = Date.now() + index;
        }
        
        const el = document.createElement('div');
        el.className = 'cart-item';
        el.innerHTML = `
          <div class="item-info">
            <span class="item-name">${escapeHtml(item.name)}</span>
            <span class="item-qty">×${item.qty}</span>
          </div>
          <button class="delete-btn" data-id="${item.id}" aria-label="Eliminar">×</button>
        `;
        list.appendChild(el);
      });

      list.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = parseInt(btn.dataset.id);
          cartItems = cartItems.filter(i => i.id !== id);
          saveCartToStorage(cartItems);
          renderCart();
          syncWithExplore();
        });
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function deleteItem(id) {
      cartItems = cartItems.filter(i => i.id !== id);
      saveCartToStorage(cartItems);
      renderCart();
      syncWithExplore();
    }

    document.getElementById('clear-all').addEventListener('click', async () => {
      if (cartItems.length === 0) return;
      if (!confirm('¿Vaciar toda la lista?')) return;
      cartItems = [];
      saveCartToStorage(cartItems);
      renderCart();
      syncWithExplore();
    });

    function syncWithExplore() {
      if (window.opener) {
        window.opener.postMessage({ type: 'CART_UPDATED' }, '*');
      }
      window.dispatchEvent(new CustomEvent('SuperAppCartUpdated'));
    }

    function renderNotes(query = "") {
      const filtered = query
        ? notes.filter(note => 
            note.title.toLowerCase().includes(query.toLowerCase()) || 
            note.content.toLowerCase().includes(query.toLowerCase())
          )
        : notes;

      const grid = document.getElementById('notes-grid');
      grid.innerHTML = '';

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📝</div>
            <p class="empty-state-text">No hay notas.<br>¡Crea tu primera nota!</p>
          </div>
        `;
        // Mostrar el botón de añadir nota cuando no hay notas
        document.getElementById('add-note-btn').style.display = 'block';
        return;
      }

      filtered.forEach(note => {
        const card = document.createElement('div');
        card.className = 'note-card';
        card.innerHTML = `
          <button class="delete-note" data-id="${note.id}" aria-label="Eliminar">×</button>
          <div class="note-title">${escapeHtml(note.title)}</div>
          <div class="note-content">${escapeHtml(note.content)}</div>
          <div class="note-date">${formatDate(note.date)}</div>
        `;
        
        card.addEventListener('click', (e) => {
          if (!e.target.classList.contains('delete-note')) {
            openNoteModal(note);
          }
        });
        
        grid.appendChild(card);
      });

      document.querySelectorAll('.delete-note').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = parseInt(btn.dataset.id);
          deleteNote(id);
        });
      });
      
      // Mostrar el botón de añadir nota cuando hay notas
      document.getElementById('add-note-btn').style.display = 'block';
    }

    function openNoteModal(note = null) {
      currentNote = note;
      const modal = document.getElementById('note-modal');
      const titleInput = document.getElementById('note-title');
      const contentInput = document.getElementById('note-content');
      const modalTitle = document.getElementById('modal-title');
      
      if (note) {
        modalTitle.textContent = 'Editar Nota';
        titleInput.value = note.title;
        contentInput.value = note.content;
      } else {
        modalTitle.textContent = 'Nueva Nota';
        titleInput.value = '';
        contentInput.value = '';
      }
      
      modal.classList.add('active');
    }

    function closeNoteModal() {
      document.getElementById('note-modal').classList.remove('active');
      currentNote = null;
    }

    function saveNote(title, content) {
      const now = new Date().toISOString();
      
      if (currentNote) {
        currentNote.title = title;
        currentNote.content = content;
        currentNote.date = now;
      } else {
        const newNote = {
          id: Date.now(),
          title,
          content,
          date: now
        };
        notes.push(newNote);
      }
      
      saveNotesToStorage(notes);
      renderNotes(document.getElementById('search-notes').value);
      closeNoteModal();
      window.dispatchEvent(new CustomEvent('SuperAppNotesUpdated'));
    }

    function deleteNote(id) {
      if (confirm('¿Eliminar esta nota?')) {
        notes = notes.filter(note => note.id !== id);
        saveNotesToStorage(notes);
        renderNotes(document.getElementById('search-notes').value);
        window.dispatchEvent(new CustomEvent('SuperAppNotesUpdated'));
      }
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString('es-ES', {
        day: '2-digit',
        month: 'short',
        year: 'numeric'
      });
    }

    document.getElementById('search-notes').addEventListener('input', (e) => {
      renderNotes(e.target.value);
    });

    document.getElementById('add-note-btn').addEventListener('click', () => {
      openNoteModal();
    });

    document.getElementById('close-modal').addEventListener('click', closeNoteModal);
    document.getElementById('cancel-note').addEventListener('click', closeNoteModal);

    document.getElementById('note-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const title = document.getElementById('note-title').value.trim();
      const content = document.getElementById('note-content').value.trim();
      
      if (title && content) {
        saveNote(title, content);
      }
    });

    document.getElementById('note-modal').addEventListener('click', (e) => {
      if (e.target.id === 'note-modal') {
        closeNoteModal();
      }
    });
  </script>
